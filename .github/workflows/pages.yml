name: Deploy Pages
on:
  push:
    branches: [gh-pages] # Как только прилетает отчет, обновляем сайт
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          ref: gh-pages
      - uses: actions/deploy-pages@v4
